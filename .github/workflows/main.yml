name: Deploy Helloworld

on:
  push:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Pull Docker image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Run tests
        run: |
          docker run -d --name test-container -p 3000:3000 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          sudo apt-get update && sudo apt-get install -y curl
          sleep 10 # Attendre que le conteneur soit prêt
          curl -f http://localhost:3000/ | grep "hello, world!" || exit 1
          docker stop test-container
          docker rm test-container
          echo "Tests passed successfully!"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Connexion au registre
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Mise à jour du conteneur
            docker stop helloworld || true
            docker rm helloworld || true
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            docker run -d \
              --name helloworld \
              --restart always \
              -p 3003:3000 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Déconnexion immédiate pour libérer le registre
            docker logout ghcr.io
